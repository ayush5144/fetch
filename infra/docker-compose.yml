# Fetch — one-command self-host.
#
# The deliberate constraint: the only infra dependency is ONE Postgres. The job
# queue lives inside Postgres (pg-boss), so there is no Redis and no extra
# broker. The api / worker / web services are the app; scale `worker` to add
# throughput without touching anything else.
services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: fetch
      POSTGRES_PASSWORD: fetch
      POSTGRES_DB: fetch
    ports:
      - '5432:5432'
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fetch -d fetch']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://fetch:fetch@postgres:5432/fetch
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://fetch:fetch@postgres:5432/fetch
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - api
